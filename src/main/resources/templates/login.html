<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM Secure Banking</title>

  <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
        overflow:hidden;
    }

    .container{
        width:900px;
        height:550px;
        display:flex;
        border-radius:25px;
        overflow:hidden;
        backdrop-filter:blur(20px);
        box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    .left-panel{
        flex:1;
        background:linear-gradient(135deg,#38bdf8,#2563eb);
        color:white;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        padding:40px;
    }

    .left-panel h1{
        font-size:42px;
        margin-bottom:15px;
    }

    .left-panel p{
        text-align:center;
        line-height:1.6;
    }

    .right-panel{
        flex:1;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
        padding:50px;
        color:white;
    }

    .form-box{
        display:flex;
        flex-direction:column;
    }

    h2{
        margin-bottom:25px;
    }

    input{
        padding:14px;
        margin-bottom:15px;
        border:none;
        border-radius:10px;
        outline:none;
        font-size:15px;
    }

    button{
        padding:14px;
        border:none;
        border-radius:10px;
        background:#38bdf8;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        transform:translateY(-2px);
        background:#0ea5e9;
    }

    .toggle{
        margin-top:20px;
        text-align:center;
    }

    .toggle a{
        color:#38bdf8;
        cursor:pointer;
        text-decoration:none;
    }

    #registerForm{
        display:none;
    }

    .message{
        margin-top:15px;
        text-align:center;
        font-weight:bold;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="left-panel">
    <h1>ATM Banking</h1>
    <p>
      Secure Banking System powered by
      Spring Boot, JWT Security,
      PostgreSQL and Thymeleaf.
    </p>
  </div>

  <div class="right-panel">

    <!-- LOGIN -->

    <form id="loginForm" class="form-box">

      <h2>Login</h2>

      <input
              type="text"
              id="loginUsername"
              placeholder="Username"
              required>

      <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              required>

      <button type="submit">
        Login
      </button>

      <div class="toggle">
        Don't have an account?
        <a onclick="showRegister()">
          Register
        </a>
      </div>

    </form>

    <!-- REGISTER -->

    <form id="registerForm" class="form-box">

      <h2>Register</h2>

      <input
              type="text"
              id="regUsername"
              placeholder="Username"
              required>

      <input
              type="email"
              id="regEmail"
              placeholder="Email"
              required>

      <input
              type="password"
              id="regPassword"
              placeholder="Password"
              required>

      <button type="submit">
        Register
      </button>

      <div class="toggle">
        Already have an account?
        <a onclick="showLogin()">
          Login
        </a>
      </div>

    </form>

    <div class="message" id="message"></div>

  </div>

</div>

<script>

  function showRegister() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "flex";
  }

  function showLogin() {
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "flex";
  }

  document.getElementById("loginForm")
  .addEventListener("submit", async function (e) {

      e.preventDefault();

      const username =
          document.getElementById("loginUsername").value;

      const password =
          document.getElementById("loginPassword").value;

      try {

          const response = await fetch("/auth/login", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json"
              },
              body: JSON.stringify({
                  username: username,
                  password: password
              })
          });

          if (!response.ok) {

              const errorText =
                  await response.text();

              alert(errorText);
              return;
          }

          const data =
              await response.json();

          console.log("Response:", data);

          localStorage.setItem(
              "token",
              data.token
          );

          console.log(
              "Stored Token:",
              localStorage.getItem("token")
          );

          alert("Login Successful");

          window.location.href =
              "/dashboard";

      } catch (error) {

          console.error(
              "Login Error:",
              error
          );

          alert(
              "Something went wrong. Check console."
          );
      }
  });

</script>

</body>
</html>
